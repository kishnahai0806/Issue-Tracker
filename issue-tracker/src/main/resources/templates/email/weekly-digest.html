<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<title>Weekly Digest</title>
</head>
<body style="margin:0;padding:0;background-color:#f4f6f8;font-family:Arial,Helvetica,sans-serif;color:#1f2937;">
	<table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background-color:#f4f6f8;padding:24px 0;">
		<tr>
			<td align="center">
				<table role="presentation" width="600" cellspacing="0" cellpadding="0" style="background-color:#ffffff;border-radius:8px;padding:32px;border:1px solid #e5e7eb;">
					<tr>
						<td>
							<h1 style="font-size:22px;margin:0 0 16px;color:#111827;">Weekly issue digest</h1>
							<p style="font-size:15px;line-height:1.6;margin:0 0 16px;">
								Hi <span th:text="${recipientName}">there</span>,
							</p>
							<p style="font-size:15px;line-height:1.6;margin:0 0 20px;">
								Here is the weekly summary for <strong th:text="${orgName}">Organization</strong>,
								<span th:text="${weekStart}">week start</span> through <span th:text="${weekEnd}">week end</span>.
							</p>
							<table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="margin:0 0 24px;">
								<tr>
									<td style="padding:14px;background-color:#eff6ff;border-radius:6px;text-align:center;">
										<div style="font-size:24px;font-weight:bold;color:#1d4ed8;" th:text="${totalIssues}">0</div>
										<div style="font-size:12px;color:#374151;">Total issues</div>
									</td>
									<td style="width:12px;"></td>
									<td style="padding:14px;background-color:#fff7ed;border-radius:6px;text-align:center;">
										<div style="font-size:24px;font-weight:bold;color:#c2410c;" th:text="${openIssues}">0</div>
										<div style="font-size:12px;color:#374151;">Open issues</div>
									</td>
									<td style="width:12px;"></td>
									<td style="padding:14px;background-color:#ecfdf5;border-radius:6px;text-align:center;">
										<div style="font-size:24px;font-weight:bold;color:#047857;" th:text="${closedIssues}">0</div>
										<div style="font-size:12px;color:#374151;">Closed issues</div>
									</td>
								</tr>
							</table>
							<a href="#" th:href="${issueUrl}" style="display:inline-block;background-color:#2563eb;color:#ffffff;text-decoration:none;padding:12px 18px;border-radius:6px;font-size:14px;">View issues</a>
							<p style="font-size:12px;line-height:1.5;margin:28px 0 0;color:#6b7280;">Issue Tracker notification</p>
						</td>
					</tr>
				</table>
			</td>
		</tr>
	</table>
</body>
</html>
