<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<title>Comment Added</title>
</head>
<body style="margin:0;padding:0;background-color:#f4f6f8;font-family:Arial,Helvetica,sans-serif;color:#1f2937;">
	<table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background-color:#f4f6f8;padding:24px 0;">
		<tr>
			<td align="center">
				<table role="presentation" width="600" cellspacing="0" cellpadding="0" style="background-color:#ffffff;border-radius:8px;padding:32px;border:1px solid #e5e7eb;">
					<tr>
						<td>
							<h1 style="font-size:22px;margin:0 0 16px;color:#111827;">New comment added</h1>
							<p style="font-size:15px;line-height:1.6;margin:0 0 16px;">
								Hi <span th:text="${recipientName}">there</span>,
							</p>
							<p style="font-size:15px;line-height:1.6;margin:0 0 16px;">
								<span th:text="${commentAuthor}">A teammate</span> commented on
								<strong th:text="${issueKey}">PROJ-1</strong>
								in <span th:text="${projectName}">Project</span>.
							</p>
							<p style="font-size:15px;line-height:1.6;margin:0 0 10px;" th:text="${issueTitle}">Issue title</p>
							<div style="background-color:#f9fafb;border-left:4px solid #2563eb;padding:14px 16px;margin:0 0 24px;color:#374151;font-size:14px;line-height:1.6;" th:text="${commentPreview}">Comment preview</div>
							<a href="#" th:href="${issueUrl}" style="display:inline-block;background-color:#2563eb;color:#ffffff;text-decoration:none;padding:12px 18px;border-radius:6px;font-size:14px;">View issue</a>
							<p style="font-size:12px;line-height:1.5;margin:28px 0 0;color:#6b7280;">Issue Tracker notification</p>
						</td>
					</tr>
				</table>
			</td>
		</tr>
	</table>
</body>
</html>
