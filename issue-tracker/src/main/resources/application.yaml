server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: issue-tracker
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://127.0.0.1:5433/issue_tracker}
    username: ${SPRING_DATASOURCE_USERNAME:issue_tracker_local}
    password: ${SPRING_DATASOURCE_PASSWORD:local_dev_password}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  liquibase:
    change-log: classpath:db/changelog/master.xml
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
  cache:
    type: redis
  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: never
  servlet:
    multipart:
      max-file-size: ${MULTIPART_MAX_FILE_SIZE:10MB}
      max-request-size: ${MULTIPART_MAX_REQUEST_SIZE:10MB}

management:
  server:
    port: ${MANAGEMENT_SERVER_PORT:8090}
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
    prometheus:
      enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  tracing:
    sampling:
      probability: ${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:0.10}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}

springdoc:
  api-docs:
    enabled: ${SPRINGDOC_API_DOCS_ENABLED:false}
  swagger-ui:
    enabled: ${SWAGGER_UI_ENABLED:false}

jwt:
  secret: ${JWT_SECRET}
  access-token-expiry-ms: ${JWT_ACCESS_EXPIRY_MS:900000}
  refresh-token-expiry-ms: ${JWT_REFRESH_EXPIRY_MS:604800000}
  issuer: ${JWT_ISSUER:issue-tracker}
  audience: ${JWT_AUDIENCE:issue-tracker-client}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

mail:
  host: ${MAIL_HOST:localhost}
  port: ${MAIL_PORT:1025}
  username: ${MAIL_USERNAME:}
  password: ${MAIL_PASSWORD:}
  from-address: ${MAIL_FROM_ADDRESS:noreply@issuetracker.com}
  from-name: ${MAIL_FROM_NAME:Issue Tracker}
  thread-pool-core-size: ${MAIL_THREAD_POOL_CORE:2}
  thread-pool-max-size: ${MAIL_THREAD_POOL_MAX:4}
  thread-pool-queue-capacity: ${MAIL_THREAD_POOL_QUEUE:100}

storage:
  endpoint: ${STORAGE_ENDPOINT:http://localhost:9000}
  access-key: ${STORAGE_ACCESS_KEY:minioadmin}
  secret-key: ${STORAGE_SECRET_KEY:minioadmin}
  bucket-name: ${STORAGE_BUCKET_NAME:issue-tracker}
  presigned-url-expiry-minutes: ${STORAGE_PRESIGNED_EXPIRY_MINUTES:60}
  max-file-size-bytes: ${STORAGE_MAX_FILE_SIZE_BYTES:10485760}

batch:
  analytics:
    cron: ${BATCH_ANALYTICS_CRON:0 0 1 * * *}

cache:
  analytics:
    trends-ttl-minutes: ${CACHE_ANALYTICS_TRENDS_TTL:60}
    burndown-ttl-minutes: ${CACHE_ANALYTICS_BURNDOWN_TTL:60}
