apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: issue-tracker-hpa
  namespace: issue-tracker
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: issue-tracker
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  # CPU-only HPA: JVM heap does not shrink reliably, so memory-based HPA can ratchet to max replicas permanently.
