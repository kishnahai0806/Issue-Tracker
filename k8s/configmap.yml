apiVersion: v1
kind: ConfigMap
metadata:
  name: issue-tracker-config
  namespace: issue-tracker
data:
  JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=75.0"
  SERVER_PORT: "8080"
  MANAGEMENT_SERVER_PORT: "8090"
  SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-service:5432/issues_db
  SPRING_REDIS_HOST: redis-service
  SPRING_REDIS_PORT: "6379"
  STORAGE_ENDPOINT: http://minio-service:9000
  STORAGE_BUCKET_NAME: issue-tracker
  MAIL_HOST: localhost
  MAIL_PORT: "1025"
  JWT_ISSUER: issue-tracker
  JWT_AUDIENCE: issue-tracker-client
  CORS_ALLOWED_ORIGINS: http://localhost:3000
  SPRINGDOC_API_DOCS_ENABLED: "false"
  SWAGGER_UI_ENABLED: "false"
  BATCH_ANALYTICS_CRON: "0 0 1 * * *"
