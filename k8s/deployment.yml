apiVersion: apps/v1
kind: Deployment
metadata:
  name: issue-tracker
  namespace: issue-tracker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: issue-tracker
  template:
    metadata:
      labels:
        app: issue-tracker
    spec:
      containers:
        - name: issue-tracker
          image: ghcr.io/kishnahai0806/issue-tracker:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
            - name: management
              containerPort: 8090
          envFrom:
            - configMapRef:
                name: issue-tracker-config
            - secretRef:
                name: issue-tracker-secret
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8090
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8090
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8090
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 12
            # Allows up to 2 minutes for JVM startup before liveness probe takes over.
